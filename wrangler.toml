name = "vexyn"
compatibility_date = "2024-11-01"

# Vexyn is a fully static Astro site — no SSR, no Functions, no Workers
# runtime code. Workers Static Assets serves the built /dist directory
# directly.
#
# There is deliberately no server-side generation endpoint. Every image is
# produced inside the visitor's browser, which is what lets the privacy
# claim be absolute rather than conditional. If a device cannot run the
# model, it is told so plainly — we do not fall back to a server.
[assets]
directory = "./dist"
not_found_handling = "404-page"
